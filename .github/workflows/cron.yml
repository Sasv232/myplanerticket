name: Check Trackers

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check trackers via cron endpoint
        run: |
          CRON_SECRET="${{ secrets.CRON_SECRET }}"
          VERCEL_URL="${{ secrets.VERCEL_URL }}"
          
          if [ -z "$CRON_SECRET" ] || [ -z "$VERCEL_URL" ]; then
            echo "Missing secrets. Set CRON_SECRET and VERCEL_URL in GitHub repo Settings > Secrets"
            exit 1
          fi
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "https://$VERCEL_URL/api/cron/check")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "HTTP $HTTP_CODE"
          echo "$BODY" | head -c 1000
          
          if [ "$HTTP_CODE" != "200" ]; then
            exit 1
          fi
